# Minimal SearXNG settings for Reasoner
# Mounted automatically by docker-compose.searxng.yml
general:
  debug: false
  instance_name: "Reasoner Search"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json
  # Suspension recovery: private instances restart frequently, so recover fast
  suspended_times:
    SearxEngineAccessDenied: 300      # 5 min (was 24h)
    SearxEngineCaptcha: 300           # 5 min (was 24h)
    SearxEngineTooManyRequests: 60    # 1 min (was 1h)
    cf_SearxEngineCaptcha: 300        # 5 min (was 15 days!)
    cf_SearxEngineAccessDenied: 300   # 5 min (was 24h)

server:
  # The secret key is injected via environment variable
  # SEARXNG_SECRET_KEY in docker-compose.searxng.yml
  limiter: false
  public_instance: false

ui:
  static_use_hash: true

# Enable a diverse set of engines across tiers for resilience.
# Weights: higher = ranked higher in merged results.
engines:
  # Tier 1 — Always reliable, never block
  - name: bing
    engine: bing
    shortcut: bi
    weight: 2
    timeout: 3.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    weight: 2
    timeout: 3.0

  - name: startpage
    engine: startpage
    shortcut: sp
    weight: 1
    timeout: 4.0

  # Tier 2 — High quality but sometimes blocked on cloud IPs
  - name: google
    engine: google
    shortcut: go
    weight: 3
    timeout: 5.0

  - name: brave
    engine: brave
    shortcut: br
    weight: 1
    timeout: 4.0

  # Tier 3 — Vertical specialists
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    weight: 1

  - name: arxiv
    engine: arxiv
    shortcut: arx
    weight: 2
    timeout: 6.0

  - name: github
    engine: github
    shortcut: gh
    weight: 2
    timeout: 5.0

  - name: stackoverflow
    engine: stackexchange
    api_site: 'stackoverflow'
    shortcut: se
    weight: 2
    timeout: 5.0

  - name: semantic_scholar
    engine: semantic_scholar
    shortcut: ss
    weight: 1
    timeout: 5.0
