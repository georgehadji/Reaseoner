# Alembic configuration for Reasoner
# Usage: alembic upgrade head

[alembic]
script_location = migrations/alembic
prepend_sys_path = src
version_path_separator = os

# Database URL is loaded from env in env.py
# sqlalchemy.url is intentionally left empty here

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
