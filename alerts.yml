groups:
  - name: reasoner
    rules:
      - alert: HighErrorRate
        expr: rate(reasoner_queries_total{status="error"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"

      - alert: QuotaExceededSpike
        expr: rate(reasoner_quota_exceeded_total[5m]) > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Quota exceeded spike — possible abuse"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(reasoner_query_duration_seconds_bucket[5m])) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 60 seconds"

      - alert: PostgresPoolExhaustion
        expr: reasoner_postgres_pool_free == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Postgres connection pool exhausted"
