[pytest]
testpaths = tests
pythonpath = src
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    timeout: marks tests with a timeout threshold (requires pytest-timeout)
filterwarnings =
    ignore::DeprecationWarning:.*simpleeval.*

addopts = --durations=10
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

[coverage:run]
source = src/reasoner
omit =
    */healing/generated_tests/*
    */tests/*
    */__pycache__/*

[coverage:report]
skip_covered = false
show_missing = true
sort = Cover
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:

