services:
  cert-generator:
    image: alpine:latest
    command: >
      sh -c "apk add --no-cache openssl &&
             mkdir -p /certs &&
             if [ ! -f /certs/ca.key ]; then
               openssl genrsa -out /certs/ca.key 4096 &&
               openssl req -x509 -new -nodes -key /certs/ca.key -sha256 -days 3650 -out /certs/ca.crt -subj '/CN=Internal CA'
             fi &&
             for service in backend frontend postgres redis; do
               openssl genrsa -out /certs/$service.key 2048 &&
               openssl req -new -key /certs/$service.key -out /certs/$service.csr -subj \"/CN=$service\" &&
               openssl x509 -req -in /certs/$service.csr -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial -out /certs/$service.crt -days 365 -sha256 -extfile /certs/extfile.cnf || 
               (echo \"subjectAltName = DNS:$service, DNS:localhost\" > /certs/extfile.cnf &&
                openssl x509 -req -in /certs/$service.csr -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial -out /certs/$service.crt -days 365 -sha256 -extfile /certs/extfile.cnf)
             done &&
             chmod -R 644 /certs/*.crt &&
             chmod -R 600 /certs/*.key"
    volumes:
      - internal_certs:/certs

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - internal_certs:/certs:ro
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      frontend:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.125'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  backend:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/reasoner?sslmode=require
      - REDIS_URL=rediss://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ENVIRONMENT=production
      - ENABLE_LEGACY_API_KEY=false
      - UVICORN_WORKERS=2
      - SSL_CERTFILE=/certs/backend.crt
      - SSL_KEYFILE=/certs/backend.key
    env_file:
      - .env
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./cache:/app/cache
      - ./history:/app/history
      - ./uploads:/app/uploads
      - internal_certs:/certs:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  frontend:
    build: ./ui-next
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NODE_EXTRA_CA_CERTS=/certs/ca.crt
    env_file:
      - .env
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      backend:
        condition: service_started
    volumes:
      - internal_certs:/certs:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./.searxng-settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: reasoner
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - internal_certs:/certs:ro
    command: >
      -c ssl=on
      -c ssl_cert_file=/certs/postgres.crt
      -c ssl_key_file=/certs/postgres.key
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
      - internal_certs:/certs:ro
    command: >
      redis-server
      --port 0
      --tls-port 6379
      --tls-cert-file /certs/redis.crt
      --tls-key-file /certs/redis.key
      --tls-ca-cert-file /certs/ca.crt
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cert", "/certs/redis.crt", "--key", "/certs/redis.key", "--cacert", "/certs/ca.crt", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.125'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  internal_certs:

